<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerBar RAS - Tournament</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: #080d1a;
    color: #fff;
    font-family: 'Rajdhani', 'Noto Sans JP', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ヘッダー */
  .header {
    background: linear-gradient(135deg, #0d1b3e 0%, #152447 100%);
    border-bottom: 2px solid #c9a84c;
    padding: 6px 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .header-logo {
    position: absolute;
    left: 20px;
    width: 55px;
    height: 55px;
    object-fit: contain;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  /* メインレイアウト */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    gap: 0;
    overflow: hidden;
  }

  /* 左列 */
  .left-panel {
    background: #0a1020;
    border-right: 1px solid rgba(201,168,76,0.2);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: #c9a84c;
    border-bottom: 1px solid rgba(201,168,76,0.3);
    padding-bottom: 8px;
    margin-bottom: 4px;
  }
  .reward-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: #111827;
    border-radius: 6px;
    border-left: 3px solid #c9a84c;
  }
  .reward-place {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #c9a84c;
  }
  .reward-text {
    font-size: 16px;
    color: #fff;
    font-weight: 600;
  }

  /* 中央パネル */
  .center-panel {
    background: #080d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    position: relative;
  }

  .level-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 6px;
    color: #c9a84c;
    text-shadow: 0 0 30px rgba(201,168,76,0.6);
    margin-bottom: 6px;
  }

  .level-label.break {
    color: #4ade80;
    text-shadow: 0 0 30px rgba(74,222,128,0.6);
  }

  .timer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 140px;
    line-height: 1;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
    transition: color 0.3s;
  }

  .timer.warning { color: #f59e0b; text-shadow: 0 0 40px rgba(245,158,11,0.5); }
  .timer.danger { color: #ef4444; text-shadow: 0 0 40px rgba(239,68,68,0.5); animation: pulse 0.5s ease-in-out infinite alternate; }
  .timer.break-mode { color: #4ade80; text-shadow: 0 0 40px rgba(74,222,128,0.5); }

  @keyframes pulse {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }

  .progress-bar {
    width: 100%;
    height: 8px;
    background: #1a2540;
    border-radius: 4px;
    margin: 8px 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9a84c, #f0d080);
    border-radius: 4px;
    transition: width 1s linear;
  }
  .progress-fill.break-fill {
    background: linear-gradient(90deg, #4ade80, #86efac);
  }

  .blind-info {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    width: 100%;
    margin-top: 6px;
  }
  .blind-box {
    background: #0d1b3e;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
  }
  .blind-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: #c9a84c;
    margin-bottom: 4px;
  }
  .blind-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #fff;
  }
  .blind-next {
    font-size: 13px;
    color: #9896a4;
    margin-top: 4px;
  }

  /* 右列 */
  .right-panel {
    background: #0a1020;
    border-left: 1px solid rgba(201,168,76,0.2);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .info-box {
    background: #111827;
    border-radius: 10px;
    padding: 8px;
    text-align: center;
  }
  .info-box-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: #9896a4;
    margin-bottom: 6px;
  }
  .info-box-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    color: #fff;
  }
  .info-box-value.gold { color: #c9a84c; }
  .info-box-value.green { color: #4ade80; }
  .info-box-value.small { font-size: 28px; }

  .info-box-sub {
    font-size: 13px;
    color: #9896a4;
    margin-top: 4px;
  }

  .next-break-box {
    background: #111827;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    border: 1px solid rgba(74,222,128,0.2);
  }

  .re-entries-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* ブラインドレベル一覧 */
  .levels-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .level-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    color: #9896a4;
  }
  .level-row.current {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.4);
    color: #c9a84c;
    font-weight: 700;
  }
  .level-row.break-row {
    background: rgba(74,222,128,0.1);
    color: #4ade80;
  }
</style>
</head>
<body>

<div class="header">
  <img class="header-logo" src="/logo.png" alt="RAS Logo">
  <div class="header-title" id="tournament-name">DAILY TOURNAMENT</div>
</div>

<div class="main">
  <!-- 左列: REWARD -->
  <div class="left-panel">
    <div class="panel-title">REWARD</div>
    <div id="reward-list"></div>
    <div class="panel-title" style="margin-top:12px;">BLIND LEVELS</div>
    <div class="levels-scroll" id="levels-list"></div>
  </div>

  <!-- 中央: タイマー -->
  <div class="center-panel">
    <div class="level-label" id="level-label">LEVEL 1</div>
    <div class="timer" id="timer">20:00</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:100%"></div>
    </div>
    <div class="blind-info">
      <div class="blind-box">
        <div class="blind-label">BLINDS</div>
        <div class="blind-value" id="blinds-value">---</div>
        <div class="blind-next" id="blinds-next"></div>
      </div>
      <div class="blind-box">
        <div class="blind-label">ANTE</div>
        <div class="blind-value" id="ante-value">---</div>
        <div class="blind-next" id="ante-next"></div>
      </div>
      <div class="blind-box">
        <div class="blind-label">NEXT LEVEL</div>
        <div class="blind-value" id="next-level-value" style="font-size:24px;">---</div>
      </div>
    </div>
  </div>

  <!-- 右列: 情報 -->
  <div class="right-panel">
    <div class="info-box">
      <div class="info-box-title">LATE REGISTRATION</div>
      <div class="info-box-value small gold" id="late-reg">---</div>
    </div>
    <div class="next-break-box">
      <div class="info-box-title">NEXT BREAK</div>
      <div class="info-box-value small green" id="next-break">---</div>
    </div>
    <div class="info-box">
      <div class="info-box-title">PLAYERS</div>
      <div class="info-box-value gold" id="players-display">0 / 0</div>
    </div>
    <div class="info-box">
      <div class="info-box-title">AVG STACK</div>
      <div class="info-box-value small" id="avg-stack">---</div>
    </div>
    <div class="re-entries-row">
      <div class="info-box">
        <div class="info-box-title">RE-ENTRIES</div>
        <div class="info-box-value small" id="reentries">0</div>
      </div>
      <div class="info-box">
        <div class="info-box-title">ADD-ON</div>
        <div class="info-box-value small" id="addons">0</div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://gfoaffarbhvshpqtqwya.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmb2FmZmFyYmh2c2hwcXRxd3lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzk0NzQsImV4cCI6MjA4NzY1NTQ3NH0.I_1UPA7sjRVrLFDMKdsgPm8fnifBclsVj35NOf3Lt4g';

  async function loadState() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/tournament_state?id=eq.current`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();
      if (data && data[0] && data[0].state) return data[0].state;
    } catch(e) {}
    return null;
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  function formatNumber(n) {
    return Number(n).toLocaleString();
  }

  function render(state) {
    if (!state) return;

    const { name, levels, currentLevelIndex, timeLeft, isRunning, players, totalPlayers, startingStack, reentries, addons, rewards, lateRegLevel } = state;

    document.getElementById('tournament-name').textContent = name || 'DAILY TOURNAMENT';

    const level = levels[currentLevelIndex];
    if (!level) return;

    const isBreak = level.isBreak;
    const totalTime = level.duration * 60;
    const progress = (timeLeft / totalTime) * 100;

    // タイマー
    const timerEl = document.getElementById('timer');
    const levelLabel = document.getElementById('level-label');
    const progressFill = document.getElementById('progress-fill');

    timerEl.textContent = formatTime(timeLeft);
    timerEl.className = 'timer';
    progressFill.className = 'progress-fill';

    if (isBreak) {
      const breakLabel = level.colorUp ? 'BREAK & COLOR UP' : 'BREAK';
      levelLabel.textContent = breakLabel;
      levelLabel.className = 'level-label break';
      timerEl.classList.add('break-mode');
      progressFill.classList.add('break-fill');
    } else {
      const levelNum = levels.slice(0, currentLevelIndex + 1).filter(l => !l.isBreak).length;
      levelLabel.textContent = `LEVEL ${levelNum}`;
      levelLabel.className = 'level-label';
      if (timeLeft <= 30) timerEl.classList.add('danger');
      else if (timeLeft <= 60) timerEl.classList.add('warning');
    }

    progressFill.style.width = progress + '%';

    // ブラインド情報
    if (!isBreak) {
      document.getElementById('blinds-value').textContent = `${formatNumber(level.sb)} / ${formatNumber(level.bb)}`;
      document.getElementById('ante-value').textContent = level.ante ? formatNumber(level.ante) : '---';
    } else {
      document.getElementById('blinds-value').textContent = '---';
      document.getElementById('ante-value').textContent = '---';
    }

    // 次レベル
    const nextLevel = levels[currentLevelIndex + 1];
    if (nextLevel && !nextLevel.isBreak) {
      document.getElementById('next-level-value').textContent = `${formatNumber(nextLevel.sb)}/${formatNumber(nextLevel.bb)}${nextLevel.ante ? ' (' + formatNumber(nextLevel.ante) + ')' : ''}`;
    } else if (nextLevel && nextLevel.isBreak) {
      document.getElementById('next-level-value').textContent = 'BREAK';
    } else {
      document.getElementById('next-level-value').textContent = 'FINAL';
    }

    // プレイヤー
    const activePlayers = totalPlayers - (state.eliminations || 0);
    document.getElementById('players-display').textContent = `${activePlayers} / ${totalPlayers}`;
    document.getElementById('reentries').textContent = reentries || 0;
    document.getElementById('addons').textContent = addons || 0;

    // AVG STACK
    const totalChips = (totalPlayers + (reentries || 0) + (addons || 0)) * (startingStack || 0);
    const avg = activePlayers > 0 ? Math.floor(totalChips / activePlayers) : 0;
    document.getElementById('avg-stack').textContent = formatNumber(avg);

    // LATE REGISTRATION
    const lateRegLvl = levels.filter(l => !l.isBreak)[lateRegLevel - 1];
    const lateRegLevelIndex = levels.indexOf(lateRegLvl);
    if (currentLevelIndex <= lateRegLevelIndex) {
      document.getElementById('late-reg').textContent = `OPEN (LV${lateRegLevel}まで)`;
    } else {
      document.getElementById('late-reg').textContent = 'CLOSED';
    }

    // NEXT BREAK
    let nextBreakTime = 0;
    let foundNextBreak = false;
    for (let i = currentLevelIndex; i < levels.length; i++) {
      if (i === currentLevelIndex) {
        if (levels[i].isBreak) { foundNextBreak = true; break; }
        nextBreakTime += timeLeft;
      } else {
        if (levels[i].isBreak) { foundNextBreak = true; break; }
        nextBreakTime += levels[i].duration * 60;
      }
    }
    if (foundNextBreak) {
      const h = Math.floor(nextBreakTime / 3600);
      const m = Math.floor((nextBreakTime % 3600) / 60);
      const s = nextBreakTime % 60;
      document.getElementById('next-break').textContent = h > 0
        ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    } else {
      document.getElementById('next-break').textContent = '---';
    }

    // REWARD一覧
    const rewardList = document.getElementById('reward-list');
    if (rewards && rewards.length > 0) {
      const places = ['1st', '2nd', '3rd', '4th', '5th', '6th', '7th', '8th'];
      rewardList.innerHTML = rewards.map((r, i) => `
        <div class="reward-row">
          <span class="reward-place">${places[i] || (i+1)+'th'}</span>
          <span class="reward-text">${r}</span>
        </div>
      `).join('');
    }

    // レベル一覧
    const levelsList = document.getElementById('levels-list');
    const nonBreakCount = { count: 0 };
    levelsList.innerHTML = levels.map((l, i) => {
      if (!l.isBreak) nonBreakCount.count++;
      const isCurrent = i === currentLevelIndex;
      if (l.isBreak) {
        return `<div class="level-row break-row ${isCurrent ? 'current' : ''}">
          <span>BREAK</span>
          <span>${l.duration}min</span>
        </div>`;
      }
      return `<div class="level-row ${isCurrent ? 'current' : ''}">
        <span>LV${nonBreakCount.count}</span>
        <span>${formatNumber(l.sb)}/${formatNumber(l.bb)}${l.ante ? '('+formatNumber(l.ante)+')' : ''}</span>
        <span>${l.duration}m</span>
      </div>`;
    }).join('');
  }

  // ── 音声機能 ──
  let lastTimeLeft = null;
  let lastLevelIndex = null;

  const sounds = {
    oneMin:    new Audio('/sound-1min.mp3'),
    tenSec:    new Audio('/sound-10sec.mp3'),
    countdown: new Audio('/sound-countdown.mp3'),
    levelUp:   new Audio('/sound-levelup.mp3'),
  };

  function playSound(key) {
    try {
      const s = sounds[key];
      s.currentTime = 0;
      s.play();
    } catch(e) {}
  }

  function checkSounds(state) {
    if (!state || !state.isRunning) {
      lastTimeLeft = state?.timeLeft;
      lastLevelIndex = state?.currentLevelIndex;
      return;
    }
    const tl = state.timeLeft;
    const li = state.currentLevelIndex;
    if (lastLevelIndex !== null && li !== lastLevelIndex) playSound('levelUp');
    if (lastTimeLeft !== null && tl !== lastTimeLeft && li === lastLevelIndex) {
      if (tl === 60) playSound('oneMin');
      else if (tl === 10) playSound('tenSec');
      else if (tl >= 1 && tl <= 5) playSound('countdown');
    }
    lastTimeLeft = tl;
    lastLevelIndex = li;
  }

  // ポーリングで状態を取得（2秒ごとにSupabaseから取得）
  setInterval(async () => {
    const state = await loadState();
    checkSounds(state);
    render(state);
  }, 1000);

  // 初期表示
  (async () => { render(await loadState()); })();
</script>
</body>
</html>
