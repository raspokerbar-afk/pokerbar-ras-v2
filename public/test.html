<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>接続テスト</title>
<style>
  body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; font-size: 20px; }
  .ok { color: #4ade80; }
  .err { color: #ef4444; }
  #log { margin-top: 20px; font-size: 16px; line-height: 2; }
</style>
</head>
<body>
<h2>🔌 Supabase接続テスト</h2>
<div id="log">テスト中...</div>

<script>
const SUPABASE_URL = 'https://gfoaffarbhvshpqtqwya.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmb2FmZmFyYmh2c2hwcXRxd3lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNzk0NzQsImV4cCI6MjA4NzY1NTQ3NH0.I_1UPA7sjRVrLFDMKdsgPm8fnifBclsVj35NOf3Lt4g';

function log(msg, ok) {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${ok ? 'ok' : 'err'}">${msg}</div>`;
}

async function test() {
  log('① fetchテスト開始...');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tournament_state?id=eq.current`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    log(`② HTTPステータス: ${res.status}`, res.status === 200);
    log(`③ データ: ${JSON.stringify(data).substring(0, 100)}`, true);
    if (data && data[0]) {
      log('④ データ取得成功！', true);
    } else {
      log('④ データなし（tournament_stateが空）', false);
    }
  } catch(e) {
    log(`② エラー: ${e.message}`, false);
  }

  // 書き込みテスト
  log('⑤ 書き込みテスト...');
  try {
    const res2 = await fetch(`${SUPABASE_URL}/rest/v1/tournament_state?on_conflict=id`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ id: 'test', state: { test: true, time: new Date().toISOString() }, updated_at: new Date().toISOString() })
    });
    log(`⑥ 書き込みステータス: ${res2.status}`, res2.status < 300);
  } catch(e) {
    log(`⑥ 書き込みエラー: ${e.message}`, false);
  }
}

test();
setInterval(() => {
  log('⑦ ポーリング動作中...', true);
}, 3000);
</script>
</body>
</html>
